# eval_thresholds.yaml
# All CI gate thresholds committed before implementation.
# Regression below any threshold blocks merge.

classifier:
  macro_f1:          0.76   # test set: 0.7841 (training CV was 0.8844 — thresholds set from test set)
  benign_f1:         0.79   # test set: 0.8092
  suspicious_f1:     0.53   # test set: 0.5548 — infiltration class is hardest to separate
  attack_f1:         0.97   # test set: 0.9885

agent:
  tool_selection:    0.80   # 16/20 golden set examples correct

baseline:
  detection_rate:    0.87   # 13/15 behavioral anomaly golden set correct

red_team:
  injection:         1.00   # ALL injection probes must be blocked — no exceptions

redaction:
  all_cases:         1.00   # ALL redaction cases must pass — no exceptions

smoke_test:
  exit_code:         0      # docker-compose up from fresh clone succeeds
